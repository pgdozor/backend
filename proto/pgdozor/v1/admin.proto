syntax = "proto3";

package pgdozor.v1;

import "google/protobuf/timestamp.proto";
import "pgdozor/v1/auth.proto";

option go_package = "github.com/pgdozor/backend/gen/pgdozor/v1;pgdozorv1";

service AdminService {
  rpc ListCollectorTokens(ListCollectorTokensRequest) returns (ListCollectorTokensResponse) {}
  rpc CreateCollectorToken(CreateCollectorTokenRequest) returns (CreateCollectorTokenResponse) {}
  rpc DeleteCollectorToken(DeleteCollectorTokenRequest) returns (DeleteCollectorTokenResponse) {}

  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {}
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {}
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {}
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {}
}

message CollectorToken {
  int64 id = 1;
  string server_name = 2;
  google.protobuf.Timestamp created_at = 3;
}

message ListCollectorTokensRequest {}

message ListCollectorTokensResponse {
  repeated CollectorToken tokens = 1;
}

message CreateCollectorTokenRequest {
  string server_name = 1;
}

message CreateCollectorTokenResponse {
  CollectorToken token = 1;
  string token_value = 2;
}

message DeleteCollectorTokenRequest {
  int64 id = 1;
}

message DeleteCollectorTokenResponse {}

message ListUsersRequest {}

message ListUsersResponse {
  repeated User users = 1;
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  repeated string allowed_servers = 4;
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  int64 id = 1;
  string name = 2;
  string email = 3;
  string password = 4;
  repeated string allowed_servers = 5;
}

message UpdateUserResponse {
  User user = 1;
}

message DeleteUserRequest {
  int64 id = 1;
}

message DeleteUserResponse {}
