syntax = "proto3";

package pgdozor.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/pgdozor/backend/gen/pgdozor/v1;pgdozorv1";

service StatementService {
  rpc ReportStatements(ReportStatementsRequest) returns (ReportStatementsResponse) {}
  rpc ReportStatementTexts(ReportStatementTextsRequest) returns (ReportStatementTextsResponse) {}
  rpc QueryStatements(QueryStatementsRequest) returns (QueryStatementsResponse) {}
  rpc QueryStatementMetrics(QueryStatementMetricsRequest) returns (QueryStatementMetricsResponse) {}
  rpc QueryStatementDetail(QueryStatementDetailRequest) returns (QueryStatementDetailResponse) {}
  rpc QueryStatementDetailMetrics(QueryStatementDetailMetricsRequest) returns (QueryStatementDetailMetricsResponse) {}
  rpc QueryStatementSamples(QueryStatementSamplesRequest) returns (QueryStatementSamplesResponse) {}
  rpc GetStatementSamplePlan(GetStatementSamplePlanRequest) returns (GetStatementSamplePlanResponse) {}
  rpc GetStatementText(GetStatementTextRequest) returns (GetStatementTextResponse) {}
  rpc ListTagKeys(ListTagKeysRequest) returns (ListTagKeysResponse) {}
  rpc ListTagValues(ListTagValuesRequest) returns (ListTagValuesResponse) {}
}

enum TagFilterOperator {
  TAG_FILTER_OPERATOR_UNSPECIFIED = 0;
  TAG_FILTER_OPERATOR_EQUAL = 1;
  TAG_FILTER_OPERATOR_NOT_EQUAL = 2;
  TAG_FILTER_OPERATOR_EXISTS = 3;
}

enum QueryKind {
  QUERY_KIND_UNSPECIFIED = 0;
  QUERY_KIND_READS = 1;
  QUERY_KIND_WRITES = 2;
  QUERY_KIND_OTHERS = 3;
}

// Column the statement table is ordered by.
enum StatementSortColumn {
  STATEMENT_SORT_COLUMN_UNSPECIFIED = 0;
  STATEMENT_SORT_COLUMN_QUERY = 1;
  STATEMENT_SORT_COLUMN_USER = 2;
  STATEMENT_SORT_COLUMN_AVG = 3;
  STATEMENT_SORT_COLUMN_CALLS = 4;
  STATEMENT_SORT_COLUMN_ROWS_PER_CALL = 5;
  STATEMENT_SORT_COLUMN_PCT_IO = 6;
  STATEMENT_SORT_COLUMN_PCT_TIME = 7;
}

// Values within a filter are ORed, separate filters are ANDed.
message TagFilter {
  string key = 1;
  TagFilterOperator op = 2;
  repeated string values = 3;
}

message ReportStatementsRequest {
  google.protobuf.Timestamp collected_at = 1;
  repeated StatementDelta statement_deltas = 2;
}

message ReportStatementsResponse {
  repeated StatementIdentity unknown_statements = 1;
}

message StatementIdentity {
  string user_name = 1;
  string database_name = 2;
  int64 query_id = 3;
}

message ReportStatementTextsRequest {
  repeated StatementText statement_texts = 1;
}

message ReportStatementTextsResponse {}

message StatementText {
  StatementIdentity identity = 1;
  string query = 2;
}

message QueryStatementsRequest {
  string server_name = 1;
  string database_name = 2;
  google.protobuf.Timestamp from = 3;
  google.protobuf.Timestamp to = 4;

  // Case-insensitive substring match against the normalized query text.
  string query_text = 5;

  // Page size. Defaults to 50 when unset.
  int32 limit = 6;

  // ANDed with query_text.
  repeated TagFilter tag_filters = 7;

  // Only statements of these kinds are returned.
  repeated QueryKind kinds = 8;

  // Number of leading rows to skip, for pagination.
  int32 offset = 9;

  StatementSortColumn sort_column = 10;
  bool sort_desc = 11;
}

message QueryStatementsResponse {
  repeated StatementStat statements = 1;

  // Whether more rows exist beyond this page.
  bool has_more = 2;
}

message QueryStatementMetricsRequest {
  string server_name = 1;
  string database_name = 2;
  google.protobuf.Timestamp from = 3;
  google.protobuf.Timestamp to = 4;
}

message QueryStatementMetricsResponse {
  StatementMetrics metrics = 1;
}

message QueryStatementDetailRequest {
  // Internal statement id (statements.id), as returned in StatementStat.id.
  int64 id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
}

message QueryStatementDetailResponse {
  // Full normalized query text.
  string query = 1;

  // Tags deduped across the statement's samples in the window.
  // A key is only present when every sample in the window agrees on its value.
  // Keys whose values differ are omitted.
  map<string, string> tags = 2;

  string server_name = 5;
  string database_name = 6;
}

message QueryStatementDetailMetricsRequest {
  // Internal statement id.
  int64 id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
}

message QueryStatementDetailMetricsResponse {
  StatementMetrics metrics = 1;
}

message QueryStatementSamplesRequest {
  // Internal statement id.
  int64 id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;

  // Page size. Defaults to 50 when unset.
  int32 limit = 4;

  // Number of leading rows to skip, for pagination.
  int32 offset = 5;
}

message QueryStatementSamplesResponse {
  repeated StatementSample samples = 1;

  // Whether more rows exist beyond this page.
  bool has_more = 2;
}

// One captured execution of the statement (from statement_samples).
message StatementSample {
  // statement_samples.id, used to lazily fetch the Auto Explain plan.
  int64 id = 1;

  google.protobuf.Timestamp occurred_at = 2;

  // The statement as executed, with actual parameter values substituted into
  // the $N placeholders (not normalized).
  string query = 3;

  // All tags as captured, including high-cardinality values.
  map<string, string> tags = 4;

  // Whether an Auto Explain plan was captured for this sample.
  bool has_plan = 5;

  double duration_ms = 6;
}

message GetStatementSamplePlanRequest {
  // statement_samples.id.
  int64 sample_id = 1;
}

message GetStatementSamplePlanResponse {
  // Concretized statement text (actual parameter values).
  string query = 1;

  // Raw Auto Explain plan as captured (JSON or text EXPLAIN output).
  string plan_json = 2;
}

message GetStatementTextRequest {
  // Internal statement id.
  int64 id = 1;
}

message GetStatementTextResponse {
  // Full normalized query text.
  string query = 1;
}

message StatementMetrics {
  StatementMetric calls = 1;
  StatementMetric avg = 2;
  StatementMetric avg_io = 3;
  StatementMetric p90 = 4;
  StatementMetric p95 = 5;
  StatementMetric p99 = 6;
  int64 bucket_ms = 7;
}

message StatementMetric {
  repeated MetricPoint series = 1;
}

message MetricPoint {
  google.protobuf.Timestamp at = 1;
  double value = 2;
}

message StatementStat {
  // Internal statement id, for building Query Detail URLs.
  int64 id = 1;

  // Structural preview of the normalized query.
  string preview = 2;
  string user_name = 3;
  double total_exec_time = 4;

  // Share of total execution time across all matching statements.
  double pct_of_total = 5;

  int64 calls = 6;
  double avg_exec_time = 7;
  int64 rows = 8;

  // Same logic as QueryStatementDetailResponse.tags.
  map<string, string> tags = 9;

  // Share of total IO time across all matching statements.
  double pct_io = 10;
}

// Delta of one pg_stat_statements row since the previous collection.
message StatementDelta {
  // Example: "app_user"
  string user_name = 1;

  // Example: "app_prod"
  string database_name = 2;

  // Example: 74381239123499122
  int64 query_id = 3;

  // Example: 12
  int64 calls = 4;

  // Example: 480
  int64 rows = 5;

  // Example: 35.7
  double total_exec_time = 6;

  // Total block-IO time (ms) summed across all IO-timing columns. Example: 4.2
  double total_io_time = 7;
}

message ListTagKeysRequest {
  string server_name = 1;
  string database_name = 2;
  google.protobuf.Timestamp from = 3;
  google.protobuf.Timestamp to = 4;
}

message ListTagKeysResponse {
  repeated TagKey keys = 1;
}

message TagKey {
  string key = 1;

  // Distinct values seen for this key in the window.
  int64 value_count = 2;
}

message ListTagValuesRequest {
  string server_name = 1;
  string database_name = 2;
  google.protobuf.Timestamp from = 3;
  google.protobuf.Timestamp to = 4;

  string key = 5;
}

message ListTagValuesResponse {
  repeated TagValue values = 1;
}

message TagValue {
  string value = 1;

  // Statements carrying this key=value in the window.
  int64 statement_count = 2;
}
